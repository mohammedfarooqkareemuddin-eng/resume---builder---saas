<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Resume Rocket - AI Resume Builder</title>
    <!-- Google Analytics (your existing ID) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YBGKY104LC"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-YBGKY104LC');
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui, sans-serif; }
        body { background:linear-gradient(135deg,#f5f7fa 0%,#e9edf2 100%); min-height:100vh; padding:20px; }
        .container { max-width:1200px; margin:0 auto; }
        .header { text-align:center; margin-bottom:30px; }
        .header h1 { font-size:2rem; background:linear-gradient(135deg,#1e3c72,#2a5298); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:8px; }
        .header p { color:#4a5568; }
        .card { background:white; border-radius:24px; box-shadow:0 20px 35px -10px rgba(0,0,0,0.1); padding:24px; margin-bottom:30px; }
        .filter-group { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:20px; }
        .filter-btn { background:#e2e8f0; border:none; padding:8px 20px; border-radius:40px; font-weight:600; cursor:pointer; transition:all 0.2s; }
        .filter-btn.active { background:#2a5298; color:white; }
        .input-group { margin-bottom:20px; }
        label { display:block; font-weight:600; color:#2d3748; margin-bottom:8px; font-size:0.9rem; }
        textarea { width:100%; padding:14px 16px; border:2px solid #e2e8f0; border-radius:16px; font-size:1rem; resize:vertical; transition:all 0.2s; }
        textarea:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.2); }
        .action-row { display:flex; flex-wrap:wrap; gap:10px; margin:15px 0; align-items:center; }
        .action-row button { width:auto; padding:10px 20px; font-size:0.9rem; color:white !important; border:none; border-radius:40px; cursor:pointer; }
        .main-btn { background:linear-gradient(135deg,#1e3c72,#2a5298); color:white; border:none; padding:14px 28px; font-size:1rem; font-weight:600; border-radius:40px; cursor:pointer; width:100%; margin-top:10px; transition:all 0.2s; }
        .main-btn:disabled { opacity:0.6; cursor:not-allowed; }
        .loader { display:inline-block; width:20px; height:20px; border:3px solid rgba(255,255,255,0.3); border-radius:50%; border-top-color:white; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:8px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .resume-preview { background:#f8fafc; border-radius:20px; padding:20px; border:1px solid #e2e8f0; }
        .resume-header { display:flex; justify-content:space-between; flex-wrap:wrap; margin-bottom:20px; padding-bottom:15px; border-bottom:2px dashed #cbd5e1; }
        .resume-title h2 { color:#1e3c72; font-size:1.5rem; }
        .resume-meta p { margin:4px 0; color:#475569; }
        .error-box { background:#fee2e2; border-left:5px solid #ef4444; padding:15px; border-radius:12px; color:#991b1b; margin-top:20px; }
        .action-buttons { display:flex; gap:12px; margin-top:20px; }
        .action-buttons button { width:auto; padding:10px 20px; background:#2a5298; color:white; border:none; border-radius:40px; cursor:pointer; }
        .video-container { position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:20px; margin-bottom:30px; }
        .video-container iframe { position:absolute; top:0; left:0; width:100%; height:100%; }
        .footer { text-align:center; color:#6c757d; font-size:0.8rem; margin-top:30px; }
        @media print { body * { visibility:hidden; } #printArea,#printArea * { visibility:visible; } #printArea { position:absolute; top:0; left:0; width:100%; padding:20px; background:white; } .action-buttons,.main-btn,.filter-group,.input-group,.action-row,.video-container,.footer,.header { display:none !important; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>🚀 Resume Rocket</h1><p>Build professional resumes in seconds with AI – free, no sign-up, no limits</p></div>

    <div class="card">
        <div class="input-group">
            <label>📝 Enter your job details</label>
            <textarea id="resumeInput" rows="4" placeholder="Example: Software Engineer with 3 years experience in React, Python, and AWS..."></textarea>
        </div>
        <button id="generateBtn" class="main-btn">✨ Generate Resume</button>
    </div>

    <div class="card" id="resultCard" style="display:none;">
        <div class="resume-preview" id="resumeContent"></div>
        <div class="action-buttons" id="actionButtons" style="display:none;"><button id="printBtn">🖨️ Print / Save as PDF</button></div>
    </div>

    <div class="card">
        <h3>📺 How Resume Rocket works</h3>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/WbJZW3UMXP0" title="Resume Rocket demo" frameborder="0" allowfullscreen></iframe>
        </div>
        <p style="color:#4a5568;">Watch this quick demo to see Resume Rocket in action.</p>
    </div>

    <div class="card">
        <h3>📬 Contact us</h3>
        <div class="contact-form" id="contactForm">
            <input type="text" id="contactName" placeholder="Your name" required>
            <input type="email" id="contactEmail" placeholder="Email address" required>
            <textarea id="contactMessage" rows="3" placeholder="Your message..."></textarea>
            <button id="sendContactBtn">📨 Send message</button>
        </div>
        <div id="contactStatus" style="margin-top:12px; font-size:0.8rem;"></div>
    </div>
    <div class="footer">Resume Rocket • AI Resume Builder • Free forever</div>
</div>

<script>
    // This is a placeholder - your actual resume generation code would go here
    document.getElementById('generateBtn').addEventListener('click', function() {
        const input = document.getElementById('resumeInput').value.trim();
        if (!input) {
            alert('Please enter your job details.');
            return;
        }
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('resumeContent').innerHTML = `
            <div id="printArea">
                <div class="resume-header">
                    <div class="resume-title"><h2>Professional Resume</h2></div>
                    <div class="resume-meta"><p><strong>Generated for:</strong> ${input}</p></div>
                </div>
                <p style="text-align:center; margin-top:20px;">Your AI-generated resume will appear here.</p>
            </div>
        `;
        document.getElementById('actionButtons').style.display = 'flex';
        document.getElementById('printBtn').onclick = () => window.print();
    });

    // Contact form - Send to Formspree
    document.getElementById('sendContactBtn').addEventListener('click', async () => {
        const name = document.getElementById('contactName').value.trim();
        const email = document.getElementById('contactEmail').value.trim();
        const msg = document.getElementById('contactMessage').value.trim();
        if (!name || !email || !msg) {
            document.getElementById('contactStatus').innerHTML = '❌ Please fill all fields.';
            return;
        }
        try {
            const response = await fetch('https://formspree.io/f/xojzwljb', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, email: email, message: msg })
            });
            if (response.ok) {
                document.getElementById('contactStatus').innerHTML = '✅ Message sent! We will reply soon.';
                document.getElementById('contactName').value = '';
                document.getElementById('contactEmail').value = '';
                document.getElementById('contactMessage').value = '';
            } else {
                document.getElementById('contactStatus').innerHTML = '❌ Failed to send. Try again.';
            }
        } catch (error) {
            document.getElementById('contactStatus').innerHTML = '❌ Network error. Try again.';
        }
        setTimeout(() => document.getElementById('contactStatus').innerText = '', 5000);
    });
</script>
</body>
</html>

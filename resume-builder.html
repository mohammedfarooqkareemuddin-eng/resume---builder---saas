<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeRocket - Professional Resume Builder</title>
    <!-- html2pdf library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }
        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
            color: #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Your Professional Resume</h2>
        
        <form id="resumeForm">
            <label for="fullName">Full Name *</label>
            <input type="text" id="fullName" placeholder="John Doe" required>

            <label for="email">Email *</label>
            <input type="email" id="email" placeholder="john@example.com" required>

            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="+1 234 567 8900">

            <label for="country">Select Country Format *</label>
            <select id="country" required>
                <option value="">Choose a country...</option>
                <option value="USA">United States (Resume)</option>
                <option value="UK">United Kingdom (CV)</option>
                <option value="Canada">Canada (Resume)</option>
                <option value="Germany">Germany (Lebenslauf)</option>
                <option value="Australia">Australia (CV)</option>
            </select>

            <label for="summary">Professional Summary</label>
            <textarea id="summary" placeholder="Brief overview of your experience and goals..."></textarea>

            <label for="experience">Work Experience</label>
            <textarea id="experience" placeholder="Company Name | Job Title | Dates&#10;Describe your responsibilities and achievements..."></textarea>

            <label for="education">Education</label>
            <textarea id="education" placeholder="Degree | Institution | Year&#10;Include relevant coursework or honors..."></textarea>

            <label for="skills">Skills</label>
            <textarea id="skills" placeholder="JavaScript, React, Project Management, Communication..."></textarea>

            <button type="button" onclick="generateResume()">Generate Resume</button>
        </form>
    </div>

    <script>
        function generateResume() {
            // Get form values
            const name = document.getElementById('fullName').value || 'Your Name';
            const email = document.getElementById('email').value || 'email@example.com';
            const phone = document.getElementById('phone').value || '';
            const country = document.getElementById('country').value || '';
            const summary = document.getElementById('summary').value || '';
            const experience = document.getElementById('experience').value || '';
            const education = document.getElementById('education').value || '';
            const skills = document.getElementById('skills').value || '';

            // Build resume HTML
            const resumeHTML = `
                <div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 30px; background: white;">
                    <h1 style="color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px;">${name}</h1>
                    <p style="color: #555; margin-bottom: 20px;">
                        ${email} ${phone ? ' | ' + phone : ''} ${country ? ' | ' + country + ' Format' : ''}
                    </p>
                    
                    <div style="margin-bottom: 25px;">
                        <h2 style="color: #3498db; border-bottom: 1px solid #ccc;">Professional Summary</h2>
                        <p>${summary || 'No summary provided.'}</p>
                    </div>
                    
                    <div style="margin-bottom: 25px;">
                        <h2 style="color: #3498db; border-bottom: 1px solid #ccc;">Experience</h2>
                        <p style="white-space: pre-line;">${experience || 'No experience listed.'}</p>
                    </div>
                    
                    <div style="margin-bottom: 25px;">
                        <h2 style="color: #3498db; border-bottom: 1px solid #ccc;">Education</h2>
                        <p style="white-space: pre-line;">${education || 'No education listed.'}</p>
                    </div>
                    
                    <div style="margin-bottom: 25px;">
                        <h2 style="color: #3498db; border-bottom: 1px solid #ccc;">Skills</h2>
                        <p>${skills || 'No skills listed.'}</p>
                    </div>
                </div>
            `;

            // PDF options
            const opt = {
                margin:        [0.5, 0.5, 0.5, 0.5],
                filename:      `${name.replace(/\s+/g, '_')}_Resume.pdf`,
                image:         { type: 'jpeg', quality: 0.98 },
                html2canvas:   { scale: 2, letterRendering: true },
                jsPDF:         { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            // Generate and download PDF
            html2pdf().set(opt).from(resumeHTML).save();
        }
    </script>
</body>
</html>

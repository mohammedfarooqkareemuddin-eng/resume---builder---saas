<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeRocket</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#4361ee,#3a0ca3);padding:20px}
.container{max-width:800px;margin:0 auto;background:white;padding:30px;border-radius:16px}
h2{text-align:center;color:#333}
label{font-weight:bold;display:block;margin-top:15px}
input,textarea,select{width:100%;padding:12px;margin-top:5px;border:1px solid #ddd;border-radius:6px;font-size:16px}
textarea{height:80px}
button{width:100%;padding:16px;background:#4361ee;color:white;border:none;border-radius:8px;font-size:18px;margin-top:20px}
</style>
</head>
<body>
<div class="container">
<h2>Create Your Professional Resume</h2>
<label>Full Name</label>
<input id="fn" placeholder="John Doe">
<label>Email</label>
<input id="em" placeholder="john@example.com">
<label>Phone</label>
<input id="ph" placeholder="+1 234 567 8900">
<label>Country</label>
<select id="ct"><option value="">Choose...</option><option>USA</option><option>UK</option><option>Canada</option></select>
<label>Professional Summary</label>
<textarea id="sm" placeholder="Brief overview..."></textarea>
<label>Work Experience</label>
<textarea id="ex" placeholder="Company | Role | Dates..."></textarea>
<label>Education</label>
<textarea id="ed" placeholder="Degree | School | Year..."></textarea>
<label>Skills</label>
<textarea id="sk" placeholder="Skill1, Skill2..."></textarea>
<button onclick="gen()">Generate Resume PDF</button>
</div>
<script>
function gen(){
var a=document.getElementById('fn').value||'Your Name';
var b=document.getElementById('em').value||'';
var c=document.getElementById('ph').value||'';
var d=document.getElementById('ct').value||'';
var e=document.getElementById('sm').value||'';
var f=document.getElementById('ex').value||'';
var g=document.getElementById('ed').value||'';
var h=document.getElementById('sk').value||'';

var body=document.createElement('div');
body.style.fontFamily='Arial';
body.style.padding='40px';
body.style.background='white';
body.innerHTML='<h1 style="background:#4361ee;color:white;padding:20px;text-align:center">ResumeRocket</h1>'+
'<h2>'+a+'</h2>'+
'<p><b>Email:</b> '+b+'</p>'+
(c?'<p><b>Phone:</b> '+c+'</p>':'')+
(d?'<p><b>Country:</b> '+d+'</p>':'')+
'<h3 style="color:#4361ee">Professional Summary</h3><p>'+e+'</p>'+
'<h3 style="color:#4361ee">Work Experience</h3><p>'+f+'</p>'+
'<h3 style="color:#4361ee">Education</h3><p>'+g+'</p>'+
'<h3 style="color:#4361ee">Skills</h3><p>'+h+'</p>';

var opt={margin:[0.5,0.5,0.5,0.5],filename:a.replace(/\s+/g,'_')+'_Resume.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2},jsPDF:{unit:'in',format:'a4',orientation:'portrait'}};
html2pdf().set(opt).from(body).save();
}
</script>
</body>
</html>

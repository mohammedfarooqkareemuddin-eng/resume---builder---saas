<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeRocket - Build Your Professional Resume</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #4361ee, #3a0ca3); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        h2 { color: #2c3e50; margin-bottom: 20px; text-align: center; font-size: 28px; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; color: #333; }
        input, textarea, select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; transition: border 0.3s; }
        input:focus, textarea:focus, select:focus { border-color: #4361ee; outline: none; box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1); }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #4361ee, #3a0ca3); color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 25px; transition: transform 0.2s, box-shadow 0.2s; }
        button:active { transform: scale(0.98); }
        .note { text-align: center; margin-top: 15px; color: #666; font-size: 14px; }
        .rocket-branding { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .rocket-branding i { color: #4361ee; font-size: 32px; }
        .rocket-branding h1 { font-size: 24px; font-weight: 700; color: #333; }
        .rocket-branding span { color: #4361ee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="rocket-branding">
            <i class="fas fa-rocket"></i>
            <h1>Resume<span>Rocket</span></h1>
        </div>
        <h2>🚀 Create Your Professional Resume</h2>
        <form id="resumeForm">
            <label for="fullName">Full Name *</label>
            <input type="text" id="fullName" placeholder="John Doe" required>
            <label for="email">Email *</label>
            <input type="email" id="email" placeholder="john@example.com" required>
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="+1 234 567 8900">
            <label for="country">Select Country Format *</label>
            <select id="country" required>
                <option value="">Choose a country...</option>
                <option value="USA">🇺🇸 United States (Resume)</option>
                <option value="UK">🇬🇧 United Kingdom (CV)</option>
                <option value="Canada">🇨🇦 Canada (Resume)</option>
                <option value="Germany">🇩🇪 Germany (Lebenslauf)</option>
                <option value="Australia">🇦🇺 Australia (CV)</option>
            </select>
            <label for="summary">Professional Summary</label>
            <textarea id="summary" placeholder="Brief overview of your experience and goals..."></textarea>
            <label for="experience">Work Experience</label>
            <textarea id="experience" placeholder="Company Name | Job Title | Dates&#10;Describe your responsibilities and achievements..."></textarea>
            <label for="education">Education</label>
            <textarea id="education" placeholder="Degree | Institution | Year&#10;Include relevant coursework or honors..."></textarea>
            <label for="skills">Skills</label>
            <textarea id="skills" placeholder="JavaScript, React, Project Management, Communication..."></textarea>
            <button type="button" onclick="generateResume()">Generate Resume PDF</button>
        </form>
        <div class="note">✨ Your resume will download as a PDF instantly — no server required.</div>
    </div>
    <script>
        function generateResume() {
            const name = document.getElementById('fullName').value.trim() || 'Your Name';
            const email = document.getElementById('email').value.trim() || 'email@example.com';
            const phone = document.getElementById('phone').value.trim() || '';
            const country = document.getElementById('country').value || '';
            const summary = document.getElementById('summary').value.trim() || 'No summary provided.';
            const experience = document.getElementById('experience').value.trim() || 'No experience listed.';
            const education = document.getElementById('education').value.trim() || 'No education listed.';
            const skills = document.getElementById('skills').value.trim() || 'No skills listed.';
            const resumeHTML = `<div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 40px; background: white; color: #1e293b;"><div style="background: linear-gradient(135deg, #4361ee, #3a0ca3); color: white; padding: 20px; border-radius: 10px 10px 0 0; margin-bottom: 30px; display: flex; align-items: center; gap: 15px;"><i class="fas fa-rocket" style="font-size: 32px;"></i><div><h1 style="margin:0; font-size: 28px;">ResumeRocket</h1><p style="margin:0; opacity:0.9;">Professional Resume Builder</p></div></div><div style="border-bottom: 3px solid #4361ee; padding-bottom: 20px; margin-bottom: 25px;"><h1 style="color: #1e293b; font-size: 32px; margin-bottom: 5px;">${name}</h1><p style="color: #64748b; font-size: 16px; margin: 0;">${email} ${phone ? ' • ' + phone : ''} ${country ? ' • ' + country + ' Format' : ''}</p></div><div style="margin-bottom: 25px;"><h2 style="color: #4361ee; font-size: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 15px;">Professional Summary</h2><p style="line-height: 1.6; color: #334155;">${summary}</p></div><div style="margin-bottom: 25px;"><h2 style="color: #4361ee; font-size: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 15px;">Work Experience</h2><p style="white-space: pre-line; line-height: 1.6; color: #334155;">${experience}</p></div><div style="margin-bottom: 25px;"><h2 style="color: #4361ee; font-size: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 15px;">Education</h2><p style="white-space: pre-line; line-height: 1.6; color: #334155;">${education}</p></div><div style="margin-bottom: 25px;"><h2 style="color: #4361ee; font-size: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 15px;">Skills</h2><p style="line-height: 1.6; color: #334155;">${skills}</p></div><div style="margin-top: 30px; padding-top: 15px; border-top: 1px solid #e2e8f0; text-align: center; color: #94a3b8; font-size: 12px;">Generated by ResumeRocket • ${new Date().toLocaleDateString()}</div></div>`;
            const opt = { margin: [0.5, 0.5, 0.5, 0.5], filename: `${name.replace(/\s+/g, '_')}_Resume.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, letterRendering: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(resumeHTML).save();
        }
    </script>
</body>
</html>

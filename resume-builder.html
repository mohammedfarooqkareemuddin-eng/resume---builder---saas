<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeRocket - Build Your Professional Resume</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #4361ee, #3a0ca3); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; }
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        textarea { height: 80px; }
        button { width: 100%; padding: 16px; background: #4361ee; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Your Professional Resume</h2>
        <label>Full Name *</label>
        <input type="text" id="fullName" placeholder="John Doe" required>
        <label>Email *</label>
        <input type="email" id="email" placeholder="john@example.com" required>
        <label>Phone</label>
        <input type="tel" id="phone" placeholder="+1 234 567 8900">
        <label>Country</label>
        <select id="country">
            <option value="">Choose...</option>
            <option value="USA">USA</option>
            <option value="UK">UK</option>
            <option value="Canada">Canada</option>
            <option value="Germany">Germany</option>
            <option value="Australia">Australia</option>
        </select>
        <label>Professional Summary</label>
        <textarea id="summary" placeholder="Brief overview..."></textarea>
        <label>Work Experience</label>
        <textarea id="experience" placeholder="Company | Role | Dates..."></textarea>
        <label>Education</label>
        <textarea id="education" placeholder="Degree | School | Year..."></textarea>
        <label>Skills</label>
        <textarea id="skills" placeholder="Skill1, Skill2, Skill3..."></textarea>
        <button onclick="generateResume()">Generate Resume PDF</button>
    </div>
    <script>
        function generateResume() {
            var name = document.getElementById('fullName').value.trim() || 'Your Name';
            var email = document.getElementById('email').value.trim() || '';
            var phone = document.getElementById('phone').value.trim() || '';
            var country = document.getElementById('country').value || '';
            var summary = document.getElementById('summary').value.trim() || '';
            var experience = document.getElementById('experience').value.trim() || '';
            var education = document.getElementById('education').value.trim() || '';
            var skills = document.getElementById('skills').value.trim() || '';

            var html = '<div style="font-family:Arial;max-width:800px;margin:0 auto;padding:40px;background:white;">' +
                '<div style="background:#4361ee;color:white;padding:20px;text-align:center;border-radius:10px 10px 0 0;margin-bottom:30px;">' +
                '<h1 style="margin:0;">ResumeRocket</h1><p style="margin:0;">Professional Resume Builder</p></div>' +
                '<h1 style="border-bottom:3px solid #4361ee;padding-bottom:10px;">' + name + '</h1>' +
                '<p><b>Email:</b> ' + email + '</p>' +
                (phone ? '<p><b>Phone:</b> ' + phone + '</p>' : '') +
                (country ? '<p><b>Country:</b> ' + country + '</p>' : '') +
                '<h2 style="color:#4361ee;">Professional Summary</h2><p>' + (summary || 'Not provided') + '</p>' +
                '<h2 style="color:#4361ee;">Work Experience</h2><p style="white-space:pre-line;">' + (experience || 'Not provided') + '</p>' +
                '<h2 style="color:#4361ee;">Education</h2><p style="white-space:pre-line;">' + (education || 'Not provided') + '</p>' +
                '<h2 style="color:#4361ee;">Skills</h2><p>' + (skills || 'Not provided') + '</p>' +
                '<p style="text-align:center;color:#999;margin-top:30px;">Generated by ResumeRocket</p></div>';

            var opt = { margin: [0.5,0.5,0.5,0.5], filename: name.replace(/\\s+/g,'_') + '_Resume.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(html).save();
        }
    </script>
</body>
</html>

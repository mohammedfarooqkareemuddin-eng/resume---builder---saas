<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeRocket</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#4361ee,#3a0ca3);padding:20px}
.container{max-width:800px;margin:0 auto;background:white;padding:30px;border-radius:16px}
h2{text-align:center;color:#333}
label{font-weight:bold;display:block;margin-top:15px}
input,textarea,select{width:100%;padding:12px;margin-top:5px;border:1px solid #ddd;border-radius:6px;font-size:16px}
textarea{height:80px}
button{width:100%;padding:16px;background:#4361ee;color:white;border:none;border-radius:8px;font-size:18px;margin-top:20px}
</style>
</head>
<body>
<div class="container">
<h2>Create Your Professional Resume</h2>
<label>Full Name</label>
<input id="fullName" placeholder="John Doe">
<label>Email</label>
<input id="email" placeholder="john@example.com">
<label>Phone</label>
<input id="phone" placeholder="+1 234 567 8900">
<label>Country</label>
<select id="country"><option value="">Choose...</option><option>USA</option><option>UK</option><option>Canada</option><option>Germany</option><option>Australia</option></select>
<label>Professional Summary</label>
<textarea id="summary" placeholder="Brief overview..."></textarea>
<label>Work Experience</label>
<textarea id="experience" placeholder="Company | Role | Dates..."></textarea>
<label>Education</label>
<textarea id="education" placeholder="Degree | School | Year..."></textarea>
<label>Skills</label>
<textarea id="skills" placeholder="Skill1, Skill2..."></textarea>
<button onclick="generateResume()">Generate Resume PDF</button>
</div>
<script>
function generateResume(){
var n=document.getElementById('fullName').value.trim()||'Your Name';
var e=document.getElementById('email').value.trim()||'';
var p=document.getElementById('phone').value.trim()||'';
var c=document.getElementById('country').value||'';
var s=document.getElementById('summary').value.trim()||'';
var x=document.getElementById('experience').value.trim()||'';
var ed=document.getElementById('education').value.trim()||'';
var sk=document.getElementById('skills').value.trim()||'';
var h='<div style="font-family:Arial;max-width:800px;margin:0 auto;padding:40px;background:white">';
h+='<div style="background:#4361ee;color:white;padding:20px;text-align:center;margin-bottom:30px"><h1>ResumeRocket</h1><p>Professional Resume Builder</p></div>';
h+='<h1 style="border-bottom:3px solid #4361ee">'+n+'</h1>';
h+='<p><b>Email:</b> '+e+'</p>';
if(p)h+='<p><b>Phone:</b> '+p+'</p>';
if(c)h+='<p><b>Country:</b> '+c+'</p>';
h+='<h2 style="color:#4361ee">Professional Summary</h2><p>'+ (s||'Not provided') +'</p>';
h+='<h2 style="color:#4361ee">Work Experience</h2><p style="white-space:pre-line">'+ (x||'Not provided') +'</p>';
h+='<h2 style="color:#4361ee">Education</h2><p style="white-space:pre-line">'+ (ed||'Not provided') +'</p>';
h+='<h2 style="color:#4361ee">Skills</h2><p>'+ (sk||'Not provided') +'</p>';
h+='<p style="text-align:center;color:#999;margin-top:30px">Generated by ResumeRocket</p></div>';
var opt={margin:[0.5,0.5,0.5,0.5],filename:n.replace(/\s+/g,'_')+'_Resume.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2},jsPDF:{unit:'in',format:'a4',orientation:'portrait'}};
html2pdf().set(opt).from(h).save();
}
</script>
</body>
</html>
